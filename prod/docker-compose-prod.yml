name: wisdomchurch

networks:
  internal:
    driver: bridge
  traefik-public:
    external: true

volumes:
  redis_data:

services:
  redis:
    image: redis:7-alpine
    container_name: wisdom_redis
    restart: unless-stopped
    command:
      - sh
      - -lc
      - |
        exec redis-server \
          --requirepass "$${REDIS_PASSWORD}" \
          --appendonly yes \
          --maxmemory 256mb \
          --maxmemory-policy allkeys-lru
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:?REDIS_PASSWORD is required}
    volumes:
      - redis_data:/data
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "REDISCLI_AUTH=\"$${REDIS_PASSWORD}\" redis-cli ping | grep PONG"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
    dns:
      - 1.1.1.1
      - 8.8.8.8

  frontend:
    image: ghcr.io/thewisdomchurch/wisdom-frontend:${FRONTEND_TAG:?FRONTEND_TAG is required}
    container_name: wisdom_frontend
    restart: unless-stopped
    pull_policy: always
    env_file:
      - .env.prod
    environment:
      NODE_ENV: production
      HOSTNAME: 0.0.0.0
      PORT: "${FRONTEND_PORT:-2000}"

      # Critical for server-side API proxy calls from Next.js.
      API_INTERNAL_URL: "http://api:${API_PORT:-8080}"
      BACKEND_INTERNAL_URL: "http://api:${API_PORT:-8080}"

      # Public browser-facing API URL.
      NEXT_PUBLIC_API_BASE_URL: "https://${API_DOMAIN:?API_DOMAIN is required}"
      NEXT_TELEMETRY_DISABLED: "1"
    expose:
      - "${FRONTEND_PORT:-2000}"
    tmpfs:
      - /app/.next/cache:rw,mode=1777
    networks:
      - internal
      - traefik-public
    depends_on:
      api:
        condition: service_started
    labels:
      - traefik.enable=true
      - traefik.docker.network=traefik-public

      - traefik.http.routers.wisdom-frontend.rule=Host(`${FRONTEND_DOMAIN:?FRONTEND_DOMAIN is required}`) || Host(`www.${FRONTEND_DOMAIN:?FRONTEND_DOMAIN is required}`)
      - traefik.http.routers.wisdom-frontend.entrypoints=websecure
      - traefik.http.routers.wisdom-frontend.tls=true
      - traefik.http.routers.wisdom-frontend.tls.certresolver=letsencrypt
      - traefik.http.routers.wisdom-frontend.middlewares=maintenance-errors@file
      - traefik.http.routers.wisdom-frontend.service=wisdom-frontend

      - traefik.http.routers.wisdom-frontend-http.rule=Host(`${FRONTEND_DOMAIN:?FRONTEND_DOMAIN is required}`) || Host(`www.${FRONTEND_DOMAIN:?FRONTEND_DOMAIN is required}`)
      - traefik.http.routers.wisdom-frontend-http.entrypoints=web
      - traefik.http.routers.wisdom-frontend-http.middlewares=redirect-to-https@file

      - traefik.http.services.wisdom-frontend.loadbalancer.server.port=${FRONTEND_PORT:-2000}
      - traefik.http.services.wisdom-frontend.loadbalancer.passhostheader=true
    dns:
      - 1.1.1.1
      - 8.8.8.8

  admin:
    image: ghcr.io/thewisdomchurch/wisdom-admin:${ADMIN_TAG:?ADMIN_TAG is required}
    container_name: wisdom_admin
    restart: unless-stopped
    pull_policy: always
    env_file:
      - .env.prod
    environment:
      NODE_ENV: production
      HOSTNAME: 0.0.0.0
      PORT: "${ADMIN_PORT:-3000}"

      # Critical fix: admin Next.js proxy must call the backend over Docker network.
      API_INTERNAL_URL: "http://api:${API_PORT:-8080}"
      BACKEND_INTERNAL_URL: "http://api:${API_PORT:-8080}"

      # Public browser-facing API URL.
      NEXT_PUBLIC_API_BASE_URL: "https://${API_DOMAIN:?API_DOMAIN is required}"
      NEXT_TELEMETRY_DISABLED: "1"
    expose:
      - "${ADMIN_PORT:-3000}"
    tmpfs:
      - /app/.next/cache:rw,mode=1777
    networks:
      - internal
      - traefik-public
    depends_on:
      api:
        condition: service_started
    labels:
      - traefik.enable=true
      - traefik.docker.network=traefik-public

      - traefik.http.routers.wisdom-admin.rule=Host(`${ADMIN_DOMAIN:?ADMIN_DOMAIN is required}`)
      - traefik.http.routers.wisdom-admin.entrypoints=websecure
      - traefik.http.routers.wisdom-admin.tls=true
      - traefik.http.routers.wisdom-admin.tls.certresolver=letsencrypt
      - traefik.http.routers.wisdom-admin.middlewares=maintenance-errors@file
      - traefik.http.routers.wisdom-admin.service=wisdom-admin

      - traefik.http.routers.wisdom-admin-http.rule=Host(`${ADMIN_DOMAIN:?ADMIN_DOMAIN is required}`)
      - traefik.http.routers.wisdom-admin-http.entrypoints=web
      - traefik.http.routers.wisdom-admin-http.middlewares=redirect-to-https@file

      - traefik.http.services.wisdom-admin.loadbalancer.server.port=${ADMIN_PORT:-3000}
      - traefik.http.services.wisdom-admin.loadbalancer.passhostheader=true
    dns:
      - 1.1.1.1
      - 8.8.8.8

  api:
    image: ghcr.io/thewisdomchurch/wisdom-api:${API_TAG:?API_TAG is required}
    container_name: wisdom_api
    restart: unless-stopped
    pull_policy: always
    env_file:
      - .env.prod
    environment:
      ENVIRONMENT: production
      GIN_MODE: release
      PORT: "${API_PORT:-8080}"
      DATABASE_URL: "${DATABASE_URL:?DATABASE_URL is required}"

      REDIS_PASSWORD: "${REDIS_PASSWORD:?REDIS_PASSWORD is required}"
      REDIS_DB: "${REDIS_DB:-0}"
      REDIS_URL: "redis://:${REDIS_PASSWORD:?REDIS_PASSWORD is required}@redis:6379/${REDIS_DB:-0}"

      TRUSTED_PROXIES: "172.16.0.0/12,10.0.0.0/8,192.168.0.0/16,127.0.0.1"

      RATE_LIMIT_GLOBAL_RPM: "${RATE_LIMIT_GLOBAL_RPM:-1000}"
      RATE_LIMIT_GLOBAL_BURST: "${RATE_LIMIT_GLOBAL_BURST:-300}"
      RATE_LIMIT_GLOBAL_WINDOW: "${RATE_LIMIT_GLOBAL_WINDOW:-1m}"
      RATE_LIMIT_AUTH_RPM: "${RATE_LIMIT_AUTH_RPM:-60}"
      RATE_LIMIT_AUTH_BURST: "${RATE_LIMIT_AUTH_BURST:-20}"
      RATE_LIMIT_AUTH_WINDOW: "${RATE_LIMIT_AUTH_WINDOW:-1m}"
    command: ["/root/wisdom-house"]
    expose:
      - "${API_PORT:-8080}"
    networks:
      - internal
      - traefik-public
    depends_on:
      redis:
        condition: service_healthy
    labels:
      - traefik.enable=true
      - traefik.docker.network=traefik-public

      - traefik.http.routers.wisdom-api.rule=Host(`${API_DOMAIN:?API_DOMAIN is required}`)
      - traefik.http.routers.wisdom-api.entrypoints=websecure
      - traefik.http.routers.wisdom-api.tls=true
      - traefik.http.routers.wisdom-api.tls.certresolver=letsencrypt
      - traefik.http.routers.wisdom-api.middlewares=maintenance-errors@file
      - traefik.http.routers.wisdom-api.service=wisdom-api

      - traefik.http.routers.wisdom-api-http.rule=Host(`${API_DOMAIN:?API_DOMAIN is required}`)
      - traefik.http.routers.wisdom-api-http.entrypoints=web
      - traefik.http.routers.wisdom-api-http.middlewares=redirect-to-https@file

      - traefik.http.services.wisdom-api.loadbalancer.server.port=${API_PORT:-8080}
      - traefik.http.services.wisdom-api.loadbalancer.passhostheader=true
    dns:
      - 1.1.1.1
      - 8.8.8.8
    extra_hosts:
      - "host.docker.internal:host-gateway"

  migrate:
    image: ghcr.io/thewisdomchurch/wisdom-api:${API_TAG:?API_TAG is required}
    container_name: wisdom_migrate
    restart: "no"
    pull_policy: always
    env_file:
      - .env.prod
    environment:
      ENVIRONMENT: production
      GIN_MODE: release
      RUN_AUTOMIGRATE: "true"
      DATABASE_URL: "${MIGRATIONS_DATABASE_URL:?MIGRATIONS_DATABASE_URL is required}"
      REDIS_PASSWORD: "${REDIS_PASSWORD:?REDIS_PASSWORD is required}"
      REDIS_DB: "${REDIS_DB:-0}"
      REDIS_URL: "redis://:${REDIS_PASSWORD:?REDIS_PASSWORD is required}@redis:6379/${REDIS_DB:-0}"
    command:
      - sh
      - -lc
      - |
        echo "Checking migration file..."
        ls -la /root/migrations || true
        test -f /root/migrations/schema.up.sql

        echo "Preparing migration database URL..."
        DB_URL="$(printf "%s" "$DATABASE_URL" \
          | sed -E 's/[?&]prefer_simple_protocol=true//g; s/\?&/?/g; s/[?&]$//g')"

        echo "Running database migration..."
        psql "$DB_URL" -v ON_ERROR_STOP=1 -f /root/migrations/schema.up.sql
        echo "Migration completed."
    networks:
      - internal
    depends_on:
      redis:
        condition: service_healthy
    dns:
      - 1.1.1.1
      - 8.8.8.8