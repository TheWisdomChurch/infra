# Docker Compose Override - Production Database Handling
# This file gracefully handles database connectivity issues
# Allows services to start even if migration fails

services:
  migrate:
    # Don't block other services if migration fails
    # Allow services to start and retry migration later
    restart: on-failure:5
    # Increase timeout to handle slow database connections
    healthcheck:
      test: ["CMD", "test", "-f", "/root/migrations/schema.up.sql"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
